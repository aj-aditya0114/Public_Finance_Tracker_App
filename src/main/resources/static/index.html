<!DOCTYPE html>
<html lang="en">
<head>
<title>Home Page</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to right,#2c3e50,#4ca1af);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    width:350px;
}

h1{
    color:#2c3e50;
}

p{
    color:#555;
    margin-bottom:30px;
}

a{
    text-decoration:none;
    padding:10px 20px;
    margin:10px;
    border-radius:5px;
    color:white;
    font-weight:bold;
}

.signup{
    background:#27ae60;
}

.login{
    background:#2980b9;
}

a:hover{
    opacity:0.85;
}

</style>

</head>

<body>

<div class="container">

<h1>Welcome to Personal Finance Tracker</h1>

<p>Track your income, expenses and manage your budget easily.</p>

<div>
    <a href="/signup" class="signup">Sign Up</a>
    <a href="/login" class="login">Login</a>
</div>

</div>

</body>
</html>
