<!DOCTYPE html>
<html lang="en" xmlns :th = "http://www.thymeleaf.org">
<head>
	<title>Budget Page</title>
	<style>
		body{
		    font-family: 'Segoe UI', Arial;
		    background: linear-gradient(to right, #eef2f3, #dfe9f3);
		    margin:0;
		    padding:0;
		}

		/* Container */
		div{
		    width: 70%;
		    margin: 40px auto;
		    background: white;
		    padding: 25px;
		    border-radius: 12px;
		    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
		}

		/* Headings */
		h2{
		    text-align: center;
		    color: #2c3e50;
		}

		/* Form Styling */
		form{
		    text-align: center;
		}

		input{
		    width: 60%;
		    padding: 10px;
		    margin: 8px 0;
		    border-radius: 6px;
		    border: 1px solid #ccc;
		}

		/* Buttons */
		button{
		    padding: 10px 20px;
		    border: none;
		    border-radius: 6px;
		    background-color: #3498db;
		    color: white;
		    cursor: pointer;
		    transition: 0.3s;
		}

		button:hover{
		    background-color: #2980b9;
		}

		/* Delete button */
		.delete{
		    background-color: #e74c3c;
		}

		.delete:hover{
		    background-color: #c0392b;
		}

		/* Table Styling */
		table{
		    width: 100%;
		    border-collapse: collapse;
		    margin-top: 20px;
		}

		thead{
		    background-color: #2c3e50;
		    color: white;
		}

		th, td{
		    padding: 12px;
		    text-align: center;
		    border-bottom: 1px solid #ddd;
		}

		/* Row hover effect */
		tr:hover{
		    background-color: #f1f1f1;
		}

		/* Message Styling */
		p{
		    text-align: center;
		    font-weight: bold;
		}
	</style>
</head>
<body>
	<div>
			<h2> Manage Your Budget Here</h2>
			
			<form th:object="${budget}" method="post" th:action="@{/budget}">
				<p th:if="${update}" th:text="${update}" style="color:rgb(255, 128, 64);"></p>
				<p th:if="${success}" th:text="${success}" style="color:green;"></p>			
				Category:
				<input type="text" th:field="*{category}" required> <br><br>
				Amount:
				<input type="number" th:field="*{limitAmount}" required> <br><br>
				<button type="submit">Add Budget</button>
			</form>
			<br><br>
			
			<h2>Budget Summery</h2>
			
			<table>
				<thead>
					<tr>
						<th>Catgeory</th>
						<th>Amount</th>
						<th>Action</th>
					</tr>
				</thead>
				
				<tbody>
					<tr th:each="bgt : ${budgetlist}">
						<td th:text="${bgt.category}"></td>
						<td th:text="${bgt.limitAmount}"></td>
						<td>
							<a th:href="@{/deleteBudget/{id}(id=${bgt.id})}">
								<button class="delete">Delete</button>
							</a>
						</td>
					</tr>
				</tbody>
			</table>
			<a th:href="@{/dashboard}">
				<button style="background-color: rgb(56, 211, 196); width: 100px;color: white;">
					Back
				</button>
			</a>
		</div>
</body>
</html>
