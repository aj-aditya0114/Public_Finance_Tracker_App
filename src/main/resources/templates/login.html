<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<title>User Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
 
<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background-color:#f4f6f9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:35px;
    width:330px;
    border-radius:6px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    width:100%;
    padding:9px;
    margin-top:15px;
    background-color:#2c3e50;
    color:white;
    border:none;
    border-radius:4px;
    font-size:15px;
}

.link{
    text-align:center;
    margin-top:15px;
}

.error{
    text-align:center;
    color:red;
}

</style>

</head>

<body>

	<div class="container">

		<h2>User Login</h2>
		<p th:text="${error}" class="error"></p>

		<form th:action="@{/loggingin}" method="post">

			Email:
			<input type="text" name="userrname"  placeholder="Enter email or Phone number" ><br><br>
						
			Password:
			<input type="text" id="password" name="password" placeholder="Enter password" required> <button id="btnn" onClick="toggle()">👁</button>
			
			<button type="submit">Login</button>

		</form>

		<div class="link">
			<h4>New user? <a th:href="@{/signup}">Sign Up</a></h4>
		</div>

	</div>

	<script>
		function toggle(){
			let pwd = document.getElementById("password");
			if(pwd.type == "text"){
				pwd.type = "password";
			}else{
				pwd.type = "text";
			}
		}
	</script>
</body>
</html>
