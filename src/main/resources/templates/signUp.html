<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<title>User Registration</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to right,#2c3e50,#4ca1af);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    width:350px;
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#2c3e50;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#27ae60;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    text-decoration:none;
    color:#2980b9;
}

</style>

</head>

<body>

<div class="container">

	<h2>User Registration</h2>

	<form th:action="@{/signup}" method="post" th:object="${user}">

		Name:
		<input type="text" th:field="*{name}" placeholder="Enter name" required><br><br>

		Email:
		<input type="email" th:field="*{email}" placeholder="Enter email" required><br><br>
		
		Phone No.:
		<input type="text" th:field="*{phone}" placeholder="Enter phone No" required>

		Password:
		<input type="password" th:field="*{password}" placeholder="Enter password" required><button id="btnn" onClick="toggle()">👁</button>

		<button type="submit">Register</button>

	</form>

	<div class="login-link">
		<h4>Already Registered? <a th:href="@{/login}">Login</a></h4>
	</div>

</div>

<script>
	function toggle(){
		let pwd = document.getElementById("password");
		if(pwd.type == "text"){
			pwd.type = "password";
		}else{
			pwd.type = "text";
		}
	}
</script>
</body>
</html>
